name: Release

on:
  push:
    tags:
      - 'v0.20.*'
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: Publish the validated Python control-plane and agent packages to PyPI
        required: true
        default: false
        type: boolean
      publish_npm:
        description: Publish the validated TypeScript SDK and driver to npm
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            facades/vscode-extension/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: facades/vscode-extension
      - run: python scripts/dev.py build
      - run: python scripts/dev.py verify-release
      - name: Publish Python packages to PyPI
        if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi
        run: uv publish --trusted-publishing always dist/artifacts/python/*
      - name: Publish TypeScript agent packages to npm
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
        run: |
          npm publish --workspace @baldr/agent-sdk --access public --provenance
          npm publish --workspace @baldr/agent-builder-typescript --access public --provenance
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/artifacts/*
            dist/baldr-router-*-source.zip
            dist/baldr-router-*-artifacts.zip
            dist/baldr-router-*-validation-evidence.zip
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/baldr-router-*-artifacts.zip
          sbom-path: dist/metadata/SBOM.spdx.json
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/baldr-router-*-source.zip
            dist/baldr-router-*-artifacts.zip
            dist/baldr-router-*-validation-evidence.zip
            dist/artifacts/*
            dist/SHA256SUMS.txt
            dist/release-manifest.json
            dist/metadata/*
